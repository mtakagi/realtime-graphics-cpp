name: C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Check Code Format
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'

    steps:
    - uses: actions/checkout@v4

    # 1. clang-format をインストール
    - name: Install clang-format
      run: sudo apt-get update && sudo apt-get install -y clang-format

    # 2. 実際にファイルを上書きフォーマットする (-i オプション)
    - name: Run clang-format
      run: |
        find . -name "*.cpp" -o -name "*.h" | grep -v "build" | grep -v "_deps" | xargs clang-format -i

    # 3. 変更された差分を reviewdog がキャッチし、PRにサジェストとして書き込む
    - name: Suggest formatting changes
      uses: reviewdog/action-suggester@v1
      with:
        tool_name: clang-format
        github_token: ${{ secrets.GITHUB_TOKEN }}
        fail_on_error: true # 差分（フォーマット違反）があった場合はCIを失敗させる

  build-and-test:
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4

    # lcov (カバレッジ集計ツール) のインストール
    - name: Install lcov
      run: sudo apt-get update && sudo apt-get install -y lcov

    # ENABLE_COVERAGE=ON を指定してCMakeを設定
    - name: Configure CMake
      run: cmake -B build -S . -DENABLE_COVERAGE=ON

    - name: Install Linting Tools
      run: sudo apt-get update && sudo apt-get install -y clang-format clang-tidy

    - name: Check Code Format (clang-format)
      # .cpp と .h ファイルを探して、フォーマット違反があればCIを失敗させる(--Werror)
      run: |
        find . -name "*.cpp" -o -name "*.h" | grep -v "build" | grep -v "_deps" | xargs clang-format --Werror --dry-run

    - name: Build
      run: cmake --build build

    - name: Run Tests
      working-directory: ${{github.workspace}}/build
      run: ctest --output-on-failure

    # カバレッジデータの収集と整形
    - name: Generate Coverage Report
      run: |
        # データを収集 (末尾に --ignore-errors mismatch を追加)
        lcov --capture --directory build --output-file coverage.info --ignore-errors mismatch
        # 標準ライブラリやテストコード自体をカバレッジ計測から除外する (こちらにも念のため追加)
        lcov --remove coverage.info '/usr/*' '*/tests/*' '*/_deps/*' --output-file coverage.info --ignore-errors mismatch

    # Codecovアクションを使用してアップロード
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: coverage.info