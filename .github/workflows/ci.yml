name: C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Check Code Format
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      # reviewdog を使って clang-format の結果を PR にコメント
      - name: Run clang-format with reviewdog
        uses: reviewdog/action-clang-format@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review  # PRの該当行にインラインコメントを残す設定
          clang_format_version: '16'  # 使用する clang-format のバージョン
          filter_mode: 'added'        # 変更された行に対してのみコメントする
          fail_on_error: true         # フォーマット違反があればCIを失敗させる

  build-and-test:
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4

    # lcov (カバレッジ集計ツール) のインストール
    - name: Install lcov
      run: sudo apt-get update && sudo apt-get install -y lcov

    # ENABLE_COVERAGE=ON を指定してCMakeを設定
    - name: Configure CMake
      run: cmake -B build -S . -DENABLE_COVERAGE=ON

    - name: Install Linting Tools
      run: sudo apt-get update && sudo apt-get install -y clang-format clang-tidy

    - name: Check Code Format (clang-format)
      # .cpp と .h ファイルを探して、フォーマット違反があればCIを失敗させる(--Werror)
      run: |
        find . -name "*.cpp" -o -name "*.h" | grep -v "build" | grep -v "_deps" | xargs clang-format --Werror --dry-run

    - name: Build
      run: cmake --build build

    - name: Run Tests
      working-directory: ${{github.workspace}}/build
      run: ctest --output-on-failure

    # カバレッジデータの収集と整形
    - name: Generate Coverage Report
      run: |
        # データを収集 (末尾に --ignore-errors mismatch を追加)
        lcov --capture --directory build --output-file coverage.info --ignore-errors mismatch
        # 標準ライブラリやテストコード自体をカバレッジ計測から除外する (こちらにも念のため追加)
        lcov --remove coverage.info '/usr/*' '*/tests/*' '*/_deps/*' --output-file coverage.info --ignore-errors mismatch

    # Codecovアクションを使用してアップロード
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: coverage.info