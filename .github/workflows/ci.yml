name: C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4

    # lcov (カバレッジ集計ツール) のインストール
    - name: Install lcov
      run: sudo apt-get update && sudo apt-get install -y lcov

    # ENABLE_COVERAGE=ON を指定してCMakeを設定
    - name: Configure CMake
      run: cmake -B build -S . -DENABLE_COVERAGE=ON

    - name: Build
      run: cmake --build build

    - name: Run Tests
      working-directory: ${{github.workspace}}/build
      run: ctest --output-on-failure

    # カバレッジデータの収集と整形
    - name: Generate Coverage Report
      run: |
        # データを収集
        lcov --capture --directory build --output-file coverage.info
        # 標準ライブラリやテストコード自体をカバレッジ計測から除外する
        lcov --remove coverage.info '/usr/*' '*/tests/*' '*/_deps/*' --output-file coverage.info

    # Codecovアクションを使用してアップロード
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: coverage.info